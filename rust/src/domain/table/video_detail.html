<!DOCTYPE html
    PUBLIC "-//W3C//DTD XHTML 1.1//EN" "https://raw.githubusercontent.com/rbatis/rbatis/master/rbatis-codegen/mybatis-3-mapper.dtd">
<mapper>
    <select id="select_by_title_like">
        ` select * from video_detail where title like concat('%', #{name}, '%') limit 1 `
    </select>


    <select id="select_page">
        ` select * from video_detail `

        <if test="do_count == false">
            ` order by created_date desc`
        </if>
    </select>


    <select id="select_page_by_tname_like">
        `select * from video_detail`
        <where>
            <if test=" tname != null && tname != '' ">
                ` and tname like concat('%', #{tname}, '%')`
            </if>
        </where>
        <if test="do_count == false">
            ` order by created_date desc`
        </if>
    </select>

    <select id="select_page_by_handle_reason_not_null">
        `select * from video_detail where handle_reason is not null `

    </select>



    <select id="search_handle_videos">
        `select * from video_detail where`
        <if test="title != null || desc != null">
            ` (`
            <if test="title != null">
                ` title like concat('%', #{title}, '%')`
            </if>
            <if test="title != null && desc != null">
                ` or `
            </if>
            <if test="desc != null">

                ` desc like concat('%', #{desc}, '%')`
            </if>
            ` ) and`
        </if>
        ` handle_step = #{handle_step} `

        <if test="handle_type != null">
            ` and handle_type = #{handle_type}`

        </if>


        <if test="do_count == false">
            ` order by created_date desc`
        </if>
    </select>


     <update id="update_handle_step_by_ids">  
        `update video_detail`  
        <set>  
            <if test="handle_step != null">  
                `handle_step = #{handle_step},`  
            </if>  
            <if test="handle_time != null">  
                `handle_time = #{handle_time},`  
            </if>  
        </set>  
        `where id in`  
        <foreach collection="ids" item="id" open="(" close=")" separator=",">  
            #{id}  
        </foreach>  
    </update>  
</mapper>
